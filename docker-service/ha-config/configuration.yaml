# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml

# ═══════════════════════════════════════════════════════
# 虚拟设备配置（开发调试用）
# ═══════════════════════════════════════════════════════

# ── 开关类实体 ────────────────────────────────────────
input_boolean:
  light_living_room:
    name: 客厅灯
    icon: mdi:ceiling-light
  light_bedroom:
    name: 卧室灯
    icon: mdi:lamp
  light_study_room:
    name: 书房灯
    icon: mdi:desk-lamp
  coffee_machine:
    name: 咖啡机
    icon: mdi:coffee-maker
  water_heater:
    name: 热水器
    icon: mdi:water-boiler
  front_door_lock:
    name: 前门门锁
    icon: mdi:lock

# ── 数值类实体（亮度 / 温度） ─────────────────────────
input_number:
  light_living_room_brightness:
    name: 客厅灯亮度
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-6
  light_bedroom_brightness:
    name: 卧室灯亮度
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-6
  light_study_room_brightness:
    name: 书房灯亮度
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-6
  ac_temperature:
    name: 空调温度设定
    min: 16
    max: 30
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer

# ── 选择类实体（空调模式） ────────────────────────────
input_select:
  ac_mode:
    name: 空调模式
    options:
      - "制冷"
      - "制热"
      - "送风"
      - "自动"
    initial: "制冷"
    icon: mdi:air-conditioner
  ac_power:
    name: 空调开关
    options:
      - "开"
      - "关"
    initial: "关"
    icon: mdi:power

# ── 模板传感器（模拟数据） ────────────────────────────
template:
  - sensor:
      - name: "室内温度"
        unique_id: sensor_indoor_temperature
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ (range(200, 280) | random / 10) | round(1) }}"
        icon: mdi:thermometer

      - name: "室内湿度"
        unique_id: sensor_indoor_humidity
        unit_of_measurement: "%"
        device_class: humidity
        state: "{{ (range(40, 70) | random) }}"
        icon: mdi:water-percent

      - name: "PM2.5"
        unique_id: sensor_pm25
        unit_of_measurement: "μg/m³"
        state: "{{ (range(15, 85) | random) }}"
        icon: mdi:air-filter

      - name: "当前功耗"
        unique_id: sensor_power_consumption
        unit_of_measurement: "W"
        device_class: power
        state: "{{ (range(200, 1500) | random) }}"
        icon: mdi:flash

  - binary_sensor:
      - name: "前门"
        unique_id: binary_sensor_front_door
        device_class: door
        state: "{{ states('input_boolean.front_door_lock') }}"
        icon: mdi:door

# ── 场景预设 ─────────────────────────────────────────
scene:
  - name: "回家模式"
    icon: mdi:home
    entities:
      input_boolean.light_living_room:
        state: "on"
      input_boolean.light_bedroom:
        state: "off"
      input_number.light_living_room_brightness:
        state: "80"
      input_select.ac_power:
        state: "开"
      input_number.ac_temperature:
        state: "24"

  - name: "离家模式"
    icon: mdi:exit-run
    entities:
      input_boolean.light_living_room:
        state: "off"
      input_boolean.light_bedroom:
        state: "off"
      input_boolean.light_study_room:
        state: "off"
      input_boolean.coffee_machine:
        state: "off"
      input_select.ac_power:
        state: "关"
      input_boolean.front_door_lock:
        state: "on"

  - name: "睡眠模式"
    icon: mdi:weather-night
    entities:
      input_boolean.light_living_room:
        state: "off"
      input_boolean.light_study_room:
        state: "off"
      input_boolean.light_bedroom:
        state: "on"
      input_number.light_bedroom_brightness:
        state: "20"
      input_select.ac_power:
        state: "开"
      input_number.ac_temperature:
        state: "26"
      input_boolean.front_door_lock:
        state: "on"

  - name: "影院模式"
    icon: mdi:movie-open
    entities:
      input_boolean.light_living_room:
        state: "on"
      input_number.light_living_room_brightness:
        state: "15"
      input_boolean.light_bedroom:
        state: "off"
      input_boolean.light_study_room:
        state: "off"
